<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <script defer>
        fetch('/get-title')
            .then(response => response.text())
            .then(data => {
                if (data) {
                    document.title = data;
                }
            })
            .catch(err => console.error('Error fetching the title:', err.message));
    </script>
    <link rel="shortcut icon" href="/img/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/buttons.css">
</head>
<body>
    <div id="header"></div>
    <div id="content">
        <table>
            <tr>
                <td style="width:30%">
                    <div id="buttons-container" class="buttons-container">
                        <button id="btn-day-card" class="button-3d">Узнать свою карту дня</button>
                        <button id="btn-day-rune" class="button-3d">Узнать свою руну дня</button>
                    </div>
                </td>
                <td>
                    <h1 id="result-head"></h1>
                    <div id="output"></div>
                </td>
            </tr>
        </table>
    </div>
    <script src="./main.js"></script>
    <script src="scripts/header.js"></script>
    <script src="scripts/left-buttons.js"></script>
    <footer>
        <p>© 2025 redheaddeer</p>
    </footer>
</body>
</html>
