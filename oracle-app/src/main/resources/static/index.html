<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <script defer>
        fetch('/get-title')
            .then(response => response.text())
            .then(data => {
                if (data) {
                    document.title = data;
                }
            })
            .catch(err => console.error('Error fetching the title:', err.message));
    </script>
    <link rel="shortcut icon" href="/img/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/buttons.css">
</head>
<body>
    <header>
        <div class="header-images">
            <img src="/img/header/runes2.png" alt="" id="img1"/>
            <img src="/img/header/runes1.png" alt="" id="img2"/>
            <img src="/img/header/runes3.png" alt="" id="img3"/>
        </div>
    </header>
    <div id="content">
        <table>
            <tr>
                <td style="width:350px">
                    <div id="buttons-container" class="buttons-container">
                        <button id="btn-day-card" class="button-3d">Получить карту дня</button>
                        <br>
                        <button id="btn-day-rune" class="button-3d">Получить руну дня</button>
                    </div>
                </td>
                <td style="width:50%">
                    <div id="output"></div>
                    <span class="cursor"></span>
                </td>
                <td style="width:50%">
                    <div id="tarot-image-form">
                        <img src="" alt="" id="tarot-image" style="width: 100%"/>
                    </div>
                </td>
            </tr>
        </table>
    </div>
    <script src="js/main.js"></script>
    <script src="js/left-buttons.js"></script>
    <footer>
        <p>© 2025 redheaddeer</p>
    </footer>
</body>
</html>
